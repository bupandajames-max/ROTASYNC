services:
  - type: web
    name: rotasync
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Set manually in the Render dashboard (Secret), not committed here:
      # GEMINI_API_KEY
      # Firebase/Firestore are still the data layer as of this deploy — this
      # only affects where the Express/Gemini server runs.
