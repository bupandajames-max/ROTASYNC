services:
  - type: web
    name: rotasync
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Set manually in the Render dashboard (Secret), not committed here:
      # GEMINI_API_KEY
      # Once Firebase Auth/Firestore are still in use during the transition
      # window, the client-side firebase-applet-config.json values stay as
      # they are — this only affects where the Express/Gemini server runs,
      # not Firebase itself.
