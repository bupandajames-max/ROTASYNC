# Firebase App Hosting configuration
# Docs: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  minInstances: 0
  maxInstances: 2
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  # Tells server.ts to serve the built /dist assets instead of running Vite in dev mode.
  - variable: NODE_ENV
    value: production
    availability:
      - RUNTIME

  # Gemini key, pulled from Cloud Secret Manager (create it with:
  #   firebase apphosting:secrets:set GEMINI_API_KEY )
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
    availability:
      - RUNTIME
